name: Render Server Keep Alive

on:
  schedule:
    # 20분마다 주기적으로 자동 실행 (Render 무료 플랜 잠자기 방지용)
    - cron: '*/20 * * * *'
  workflow_dispatch: # 수동으로 가동하고 싶을 때를 위한 버튼 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render server
        run: |
          curl -s https://여기에-석연님의-render-배포-주소.onrender.com > /dev/null
          echo "서버 깨우기 신호 발송 완료"
